<script>
async function send() {
    let input = document.getElementById("input");
    let chat = document.getElementById("chat");

    let text = input.value.trim();
    if (!text) return;

    chat.innerHTML += `<div class="msg user">${text}</div>`;
    input.value = "";

    let loading = document.createElement("div");
    loading.className = "msg ai";
    loading.innerText = "🔎 Wiki keresés...";
    chat.appendChild(loading);

    chat.scrollTop = chat.scrollHeight;

    let result = await getWikiAnswer(text);

    loading.remove();

    chat.innerHTML += `<div class="msg ai">${result}</div>`;
    chat.scrollTop = chat.scrollHeight;
}

async function getWikiAnswer(query) {
    try {
        let searchUrl = `https://fisch.fandom.com/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json`;

        let res = await fetch(searchUrl);
        let data = await res.json();

        if (!data.query.search.length) {
            return "❌ Nem találtam wiki adatot erre a kérdésre.";
        }

        let title = data.query.search[0].title;

        let pageUrl = `https://fisch.fandom.com/api.php?action=parse&page=${encodeURIComponent(title)}&format=json`;

        let pageRes = await fetch(pageUrl);
        let pageData = await pageRes.json();

        let html = pageData.parse.text["*"];

        // nagyon basic clean (csak rövidítés)
        let temp = document.createElement("div");
        temp.innerHTML = html;

        let text = temp.innerText.slice(0, 800);

        return `🎣 <b>${title}</b><br><br>${text}...<br><br>📌 Source: Fisch Fandom Wiki`;

    } catch (e) {
        return "⚠️ Hiba történt a wiki betöltésnél.";
    }
}
</script>
